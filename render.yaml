services:
  - type: web
    name: documind-api
    runtime: python
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pip install -r api/requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    pythonVersion: "3.11"
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: OPENAI_MODEL
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        value: rag
      - key: VECTOR_STORE
        value: pinecone
      - key: INTERNAL_API_KEY
        sync: false
      - key: CONFIDENCE_THRESHOLD
        value: "0.75"
      - key: TOP_K
        value: "5"
      - key: CHUNK_SIZE
        value: "400"
      - key: CHUNK_OVERLAP
        value: "100"
      - key: CHAT_HISTORY_WINDOW
        value: "4"
